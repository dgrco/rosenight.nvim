# Foot terminal theme
# https://codeberg.org/dnkl/foot/wiki#themes
#
# Place in ~/.config/foot/themes/rosenight and load with:
#   include=~/.config/foot/themes/rosenight

[colors-dark]
background=1f1f28
foreground=e0def4

selection-background=292e42
selection-foreground=e0def4

cursor=1f1f28 e0def4

# 16-color palette
regular0=1f1f28
regular1=eb6f92
regular2=9ccfd8
regular3=f6c177
regular4=3e8fb0
regular5=c4a7e7
regular6=9ccfd8
regular7=e0def4

bright0=3b4261
bright1=eb6f92
bright2=9ccfd8
bright3=f6c177
bright4=3e8fb0
bright5=eb6f92
bright6=9ccfd8
bright7=e0def4

# Dim colours (foot supports these natively)
dim0=1f2335
dim1=eb6f92
dim2=9ccfd8
dim3=f6c177
dim4=3e8fb0
dim5=c4a7e7
dim6=9ccfd8
dim7=908caa

urls=3e8fb0
