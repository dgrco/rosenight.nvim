# Foot terminal theme
# https://codeberg.org/dnkl/foot/wiki#themes
#
# Place in ~/.config/foot/themes/rosenight and load with:
#   include=~/.config/foot/themes/rosenight

[colors-dark]
background={{bg0}}
foreground={{fg1}}

selection-background={{bg3}}
selection-foreground={{fg0}}

cursor={{bg0}} {{fg1}}

# 16-color palette
regular0={{bg0}}
regular1={{red}}
regular2={{green}}
regular3={{yellow}}
regular4={{blue}}
regular5={{purple}}
regular6={{cyan}}
regular7={{fg1}}

bright0={{bg4}}
bright1={{red}}
bright2={{green}}
bright3={{yellow}}
bright4={{blue}}
bright5={{pink}}
bright6={{cyan}}
bright7={{fg0}}

# Dim colours (foot supports these natively)
dim0={{bg1}}
dim1={{red}}
dim2={{green}}
dim3={{yellow}}
dim4={{blue}}
dim5={{purple}}
dim6={{cyan}}
dim7={{fg2}}

urls={{blue}}
